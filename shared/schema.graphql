"""
What you get back after accepting an AI suggestion, e.g. the new `v3` queued to try
"""
type AcceptDraftResult {
  """
  The number of the version that was just created and queued up to try, e.g. `3`
  """
  createdVersion: VersionNumber

  """
  The recipe, now with the accepted version added to its chain, e.g. `"Grandma’s lasagna"` now up to `v3`
  """
  recipe: Recipe!
}

"""
One release in the app’s "What’s new" list — the changes shipped in a given version of the app, e.g. `"1.2"` with "Faster recipe imports"
"""
type ChangelogEntry {
  """
  When that version was released, e.g. `"2026-07-18T00:00:00.000Z"` (`null` for a release not yet dated)
  """
  date: DateTime

  """
  The list of changes in this release, one line each, ready to show to the user, e.g. `"Faster recipe imports"` then `"Fixed a crash when exporting"`
  """
  notes: [String!]!

  """The app version these notes are for, e.g. `"1.2"`"""
  version: String!
}

"""
Everything needed to save a brand-new recipe (its `v1`), once you have reviewed the import preview and confirmed it, e.g. `"Grandma’s lasagna"` with its ingredients and steps
"""
input CreateRecipeInput {
  """Its course, e.g. `PLAT` for lasagna, as detected during import"""
  category: DishCategory!

  """
  The ingredient list, in order, e.g. `"Flour — 250 g"` then `"Eggs — 3"`
  """
  ingredients: [IngredientInput!]

  """Where it came from, e.g. `"Marmiton"` or `"Mum"`"""
  sourceLabel: String

  """
  The method, one instruction per step, in order, e.g. `"Fold in the egg whites"`
  """
  steps: [StepText!]!

  """Optional one-line subtitle, e.g. `"with fresh basil"`"""
  subtitle: RecipeSubtitle

  """The recipe’s name, e.g. `"Grandma’s lasagna"`"""
  title: RecipeTitle!

  """
  Thermomix settings lined up with the steps above — one entry per step, e.g. `"10 min / 100°C / speed 2"`, `null` for a step with no machine settings (only for TMX recipes)
  """
  tmxSteps: [TmxSettingsInput]

  """Cooked dish (`PLAT`) or Thermomix recipe (`TMX`)"""
  type: RecipeType!
}

"""
A date and time, given in the standard ISO 8601 format, e.g. `"2026-07-18T14:30:00.000Z"` (the `"Z"` means UTC — the app shows it in your local time)
"""
scalar DateTime

"""
The course a dish belongs to. Detected once at import, shared by every version, and used to group and sort the library.
"""
enum DishCategory {
  """Bread and bakery, e.g. `"Sourdough loaf"`"""
  BOULANGERIE

  """Dessert, e.g. `"Tarte tatin"`"""
  DESSERT

  """Starter, e.g. `"Goat cheese salad"`"""
  ENTREE

  """Main course, e.g. `"Grandma’s lasagna"`"""
  PLAT

  """Sauce or condiment, e.g. `"Béchamel"`"""
  SAUCE

  """Soup, e.g. `"Pumpkin velouté"`"""
  SOUPE
}

"""
The AI’s suggestion for your next attempt, e.g. `"Less sugar, longer resting time"`. After a low-scoring essai, the AI reads your rating and notes and proposes a tweaked version. It is just a proposal shown on screen — nothing is saved until you accept it (see acceptDraft).
"""
type Draft {
  """
  A one-line summary of what it changes, e.g. `"Less sugar, longer resting time"`
  """
  changeSummary: String!

  """
  The complete ingredient list of the suggested version, e.g. `"Sugar — 80 g"` (not just what changed)
  """
  ingredients: [Ingredient!]!

  """
  The AI’s reasoning — why it thinks this change will help, based on your last notes, e.g. `"You noted it was too sweet, so cutting the sugar should balance it"`
  """
  rationale: String!

  """
  The complete method of the suggested version, e.g. `"Rest the dough for 2 h"` (not just what changed)
  """
  steps: [StepText!]!

  """
  Per-step Thermomix settings aligned with steps, e.g. `"10 min / 100°C / speed 2"` (`null` = plain step; `[]` if not tmx)
  """
  tmxSteps: [TmxSettings]!

  """
  The number this version would get if you accept it (the next one in the chain), e.g. `3`
  """
  versionNumber: VersionNumber!
}

"""
A complete next-version draft to accept as an iteration, e.g. the AI’s `"Less sugar, longer resting time"` proposal. Send the FULL next version (omitted ingredients/steps wipe those lists).
"""
input DraftInput {
  """
  A short human summary of what the next version changes, e.g. `"Less sugar"`
  """
  changeSummary: String!

  """
  The complete ingredient list of the next version, e.g. `"Sugar — 80 g"`
  """
  ingredients: [IngredientInput!]!

  """The reasoning behind the change, e.g. `"You noted it was too sweet"`"""
  rationale: String!

  """
  The complete step list of the next version, e.g. `"Rest the dough for 2 h"`
  """
  steps: [StepText!]!

  """
  Per-step Thermomix settings, aligned with steps, e.g. `"10 min / 100°C / speed 2"` (`null` = plain step)
  """
  tmxSteps: [TmxSettingsInput]
}

"""
The read model behind the home screen, e.g. `"Grandma’s lasagna v3"` waiting to be cooked plus yesterday’s risotto essai
"""
type Home {
  """
  Every recipe (the app groups them by type), e.g. `"Grandma’s lasagna"` and `"Tarte tatin"`
  """
  library: [Recipe!]!

  """
  Latest executed versions across all recipes, newest first, e.g. the risotto `v2` you rated `4` yesterday
  """
  recentEssais: [Version!]!

  """
  Recipes with a pending version awaiting an essai, e.g. `"Grandma’s lasagna"` whose `v3` is queued up
  """
  toTest: [Recipe!]!
}

"""Structured recipe extracted from an import source (editable preview)"""
type ImportAnalysis {
  """The dish category detected by the AI"""
  category: DishCategory!
  ingredients: [ImportIngredient!]!
  sourceLabel: String
  steps: [String!]!
  subtitle: String
  title: String!

  """Per-step Thermomix settings, aligned with steps (null = plain step)"""
  tmxSteps: [ImportTmxSettings]
  type: RecipeType!
}

"""A recipe ingredient extracted by the AI (unvalidated preview)"""
type ImportIngredient {
  name: String!
  quantity: String!
}

"""
A tally of what was restored after an import — how many rows of each kind were loaded, e.g. `12` recipes and `37` versions
"""
type ImportResult {
  """How many recipes were imported, e.g. `12`"""
  recipes: Int!

  """How many versions (across all those recipes) were imported, e.g. `37`"""
  versions: Int!
}

"""
Thermomix settings for one step extracted by the AI (unvalidated preview)
"""
type ImportTmxSettings {
  reverse: Boolean
  speed: String
  temperature: String
  time: String
}

"""
One line of the ingredient list: what it is and how much of it. The list keeps its order, e.g. `"Flour — 250 g"`, then `"Butter — 100 g"`, then `"Eggs — 3"`.
"""
type Ingredient {
  """What the ingredient is, e.g. `"Flour"` or `"Fine salt"`"""
  name: IngredientName!

  """How much of it, unit included, e.g. `"250 g"`, `"2 tbsp"`, `"1 pinch"`"""
  quantity: IngredientQuantity!
}

"""
One ingredient line to save, e.g. name `"Flour"` + quantity `"250 g"`. Order is kept.
"""
input IngredientInput {
  """What it is, e.g. `"Flour"`"""
  name: IngredientName!

  """How much, unit included, e.g. `"250 g"`"""
  quantity: IngredientQuantity!
}

"""
The name of an ingredient, e.g. `"Flour"` or `"Fine salt"` (1 to 120 characters)
"""
scalar IngredientName

"""
How much of an ingredient, unit included, e.g. `"250 g"`, `"2 tbsp"`, `"1 pinch"` (1 to 60 characters)
"""
scalar IngredientQuantity

type Mutation {
  """
  Accept an AI suggestion (optionally after editing it). It becomes the next version in the chain, added to your to-do list of attempts to cook.
  
  ```graphql
  acceptDraft(recipeId: "9f1c-a3b2", draft: {
    changeSummary: "Less sugar"
    rationale: "You noted it was too sweet"
    ingredients: [{ name: "Sugar", quantity: "80 g" }]
    steps: ["Rest the dough for 2 h", "Bake at 180°C"]
  }) {
    createdVersion
  }
  ```
  """
  acceptDraft(
    """The full suggested version to save (with any edits you made)"""
    draft: DraftInput!

    """The recipe being iterated on, e.g. the id of `"Grandma’s lasagna"`"""
    recipeId: RecipeId!
  ): AcceptDraftResult!

  """
  Analyze an import source (photos, a URL or raw text) into a structured recipe preview. Exactly one source must be provided. Results are cached server-side by SHA-256.
  """
  analyzeImport(
    """Base64 JPEGs (no data-URL prefix)"""
    photos: [String!]

    """Raw recipe text"""
    text: String

    """A recipe web page to read"""
    url: String
  ): ImportAnalysis!

  """
  Save a new recipe. Turns a confirmed import preview into a real recipe with its first version (`v1`). Returns the freshly created recipe.
  
  ```graphql
  createRecipe(input: {
    type: PLAT
    category: PLAT
    title: "Grandma's lasagna"
    ingredients: [{ name: "Flour", quantity: "250 g" }]
    steps: ["Layer the pasta", "Bake at 200°C"]
  }) {
    id
    toTest { number }
  }
  ```
  """
  createRecipe(
    """The recipe to create — name, category, ingredients, steps…"""
    input: CreateRecipeInput!
  ): Recipe!

  """
  Delete a recipe for good, along with every version and attempt on it. Returns `true` on success.
  
  ```graphql
  deleteRecipe(id: "9f1c-a3b2")
  ```
  """
  deleteRecipe(
    """Which recipe to delete"""
    id: RecipeId!
  ): Boolean!

  """
  Drop a planned-but-not-yet-cooked version from the to-do list and delete it. Returns `true` on success. Won’t delete a recipe’s only version.
  
  ```graphql
  discardPendingVersion(recipeId: "9f1c-a3b2", versionNumber: 3)
  ```
  """
  discardPendingVersion(
    """Which recipe"""
    recipeId: RecipeId!

    """Which pending (untried) version to discard, e.g. `3`"""
    versionNumber: VersionNumber!
  ): Boolean!

  """
  Restore a backup. WARNING: this REPLACES everything you currently have with the contents of the JSON text (as produced by exportData). Returns a count of what was loaded, e.g. `12` recipes.
  
  ```graphql
  importData(payload: "{\"recipes\":[…],\"versions\":[…]}") {
    recipes
    versions
  }
  ```
  """
  importData(
    """The backup as JSON text, exactly as exportData produced it"""
    payload: String!
  ): ImportResult!

  """
  Crown a version as the recipe’s new reference (its "currentVersion") — do this after an attempt scored `4` or more. Returns the updated recipe.
  
  ```graphql
  promoteVersion(recipeId: "9f1c-a3b2", versionNumber: 2) {
    currentVersion { number note }
  }
  ```
  """
  promoteVersion(
    """Which recipe"""
    recipeId: RecipeId!

    """Which version to make the reference, e.g. `2`"""
    versionNumber: VersionNumber!
  ): Recipe!

  """
  Save what happened when you cooked a version: its rating and your notes. Fast and does not call the AI. If the rating is low and you want a suggested improvement, ask for a draft separately (see requestDraft).
  
  ```graphql
  recordEssai(input: {
    recipeId: "9f1c-a3b2"
    versionNumber: 2
    note: 4
    remarks: "Still a touch too sweet, but the texture is spot on"
  }) {
    version { number note }
    promotionSuggested
  }
  ```
  """
  recordEssai(
    """The attempt to record — which version, the rating, the notes"""
    input: RecordEssaiInput!
  ): RecordEssaiResult!

  """
  Ask the AI for a suggested next version. It looks at your most recent attempt (its rating and notes) and proposes one improvement. Nothing is saved yet — you get a proposal to review.
  
  ```graphql
  requestDraft(recipeId: "9f1c-a3b2") {
    versionNumber
    changeSummary
    rationale
  }
  ```
  """
  requestDraft(
    """
    The recipe to get a suggestion for, e.g. the id of `"Grandma’s lasagna"`
    """
    recipeId: RecipeId!
  ): Draft!

  """
  Rename a recipe — change its title and/or its subtitle. Returns the updated recipe.
  
  ```graphql
  updateRecipe(id: "9f1c-a3b2", input: { title: "Nonna's lasagna" }) {
    id
    title
  }
  ```
  """
  updateRecipe(
    """Which recipe to rename"""
    id: RecipeId!

    """The new title/subtitle (send only what changes)"""
    input: UpdateRecipeInput!
  ): Recipe!
}

"""
A rating out of 5, as a whole number from `1` (bad) to `5` (excellent), e.g. `4`. A version rated `4` or more can become the recipe’s reference.
"""
scalar Note

type Query {
  """
  The app’s "What’s new" list — one entry per release, newest first. Feeds the changelog screen. For example the `"1.2"` entry with notes `"Faster recipe imports"` and `"Fixed a crash when exporting"`, then the `"1.1"` entry, and so on.
  
  ```graphql
  changelog {
    version
    date
    notes
  }
  ```
  """
  changelog: [ChangelogEntry!]!

  """
  Download all your data as one JSON text — a full backup of every recipe and version you own (e.g. your `"Grandma’s lasagna"` and all its essais). Pair it with importData to move or restore your library.
  
  ```graphql
  query {
    exportData
  }
  ```
  """
  exportData: String!

  """
  Everything the home screen needs in one shot: the attempts waiting to be cooked (toTest), your whole library, and your latest cooked essais. For example, toTest might hold `"Grandma’s lasagna v3"` while recentEssais shows the risotto you rated yesterday.
  
  ```graphql
  home {
    toTest { id title toTest { number } }
    recentEssais { number note remarks }
  }
  ```
  """
  home: Home!

  """
  Fetch one recipe by its id, with everything on it. Returns `null` if no such recipe exists.
  
  ```graphql
  recipe(id: "9f1c-a3b2") {
    title
    currentVersion { number note }
    pendingEssais { number change }
  }
  ```
  """
  recipe(
    """The id of the recipe to fetch, e.g. `"9f1c-a3b2"`"""
    id: RecipeId!
  ): Recipe

  """
  One page of your recipe library, loaded a few at a time for infinite scroll. You can narrow it (e.g. only `TMX` recipes, or only `DESSERT`) and choose the order. For example: the 20 most recently updated dishes, then pass the last id as `after` to load the next 20.
  
  ```graphql
  recipes(type: TMX, sort: UPDATED_AT, order: DESC, limit: 20) {
    items { id title currentVersion { note } }
    hasMore
  }
  ```
  """
  recipes(
    """Cursor: return the page following this recipe id, e.g. `"9f1c-a3b2"`"""
    after: RecipeId

    """
    Facet: keep only this dish category, e.g. `DESSERT`. When set, the page is coerced to updatedAt desc — the sort/order args are ignored (ranking within one category is meaningless, and it keeps the composite-index surface bounded)
    """
    category: DishCategory

    """Maximum recipes returned in the page, e.g. `20`"""
    limit: Int = 20

    """
    Sort direction, e.g. `DESC` (ignored for the category sort, which is fixed)
    """
    order: SortOrder = DESC

    """Field the page is ordered by, e.g. `UPDATED_AT`"""
    sort: RecipeSort = UPDATED_AT

    """Facet: keep only this recipe type, e.g. `TMX`"""
    type: RecipeType
  ): Recipes!
}

"""
A dish you are perfecting over time. A recipe is the whole experiment, not a single recipe card: it holds a chain of versions (v1, v2, v3 …), remembers which one is the current best, and which one is queued up to try next. Think `"Grandma’s lasagna"` and every attempt you have made to nail it.
"""
type Recipe {
  """
  The best rating this recipe ever got, across all the attempts you have cooked, e.g. `5` (`1`–`5`). `null` if you have never tried any version yet.
  """
  bestNote: Note

  """
  Which course it is, e.g. `DESSERT` for a tarte tatin. Set once at import and shared by every version; used to group the library.
  """
  category: DishCategory!

  """When the recipe was first imported, e.g. `"2026-07-18T14:30:00.000Z"`"""
  createdAt: DateTime!

  """
  The reference version — the one you consider "the recipe" today, the one to reproduce, e.g. `v2` of `"Grandma’s lasagna"`. A version becomes eligible once its essai (run on the pending version) scores `4` or more; you then confirm it with promoteVersion. `null` until that first promotion, while the recipe is still being dialled in.
  """
  currentVersion: Version

  """Its unique identifier, e.g. `"9f1c…-a3b2"`"""
  id: RecipeId!

  """
  Your to-do list of attempts: versions created but not yet cooked, newest first, e.g. `v3` then `v2`. Empty for a brand-new recipe that only has its original `v1` (that one is run straight from the recipe card, not offered here).
  """
  pendingEssais: [Version!]!

  """
  An optional one-liner under the title, e.g. `"with fresh basil"`. `null` if none.
  """
  subtitle: String

  """Its name, e.g. `"Grandma’s lasagna"`"""
  title: RecipeTitle!

  """
  The version queued up to cook next — created but not yet tried, e.g. `v3`. Right after import this points to the original `v1`. It is `null` only once every version has been tried (or the pending one was discarded or promoted).
  """
  toTest: Version

  """Whether it is a cooked dish (`PLAT`) or a Thermomix recipe (`TMX`)"""
  type: RecipeType!

  """
  When anything last changed on it (a new version, a rating…), e.g. `"2026-07-18T14:30:00.000Z"`. Drives library sort.
  """
  updatedAt: DateTime!

  """
  How many versions exist so far — also the number of the most recent one, e.g. `3` after `v1 → v2 → v3`
  """
  versionCount: VersionNumber!

  """The whole history, oldest first, e.g. `v1 → v2 → v3`"""
  versions: [Version!]!
}

"""
The unique id of a recipe — a long random string like `"9f1c…-a3b2"` you pass around to fetch or change that one recipe (e.g. your `"Grandma’s lasagna"`)
"""
scalar RecipeId

"""Field the paginated recipe library is ordered by, e.g. `UPDATED_AT`"""
enum RecipeSort {
  """
  Dish course order (`ENTREE → PLAT → DESSERT → SOUPE → SAUCE → BOULANGERIE`), most recently modified first within a course
  """
  CATEGORY

  """
  Most recently modified first (honours order), e.g. today’s lasagna edit on top
  """
  UPDATED_AT
}

"""
The optional one-line subtitle under the name, e.g. `"with fresh basil"` (1 to 200 characters)
"""
scalar RecipeSubtitle

"""A recipe’s name, e.g. `"Grandma’s lasagna"` (1 to 200 characters)"""
scalar RecipeTitle

"""
The kind of culinary experiment. Fixed at import, it decides how a version is displayed and how the AI is allowed to iterate on it.
"""
enum RecipeType {
  """A cooked dish — steps are plain text, e.g. `"Grandma’s lasagna"`"""
  PLAT

  """
  A Thermomix recipe — each step also carries machine settings, e.g. `"10 min / 100°C / speed 2"`
  """
  TMX
}

"""
One slice of your recipe library — a single "page" of results, the way an app loads a few at a time as you scroll rather than everything at once.
"""
type Recipes {
  """
  Are there more recipes to load after this page? (`true` = keep scrolling, `false` = you have reached the end)
  """
  hasMore: Boolean!

  """
  The recipes on this page, e.g. `"Grandma’s lasagna"` then `"Tarte tatin"`
  """
  items: [Recipe!]!

  """
  How many recipes are on THIS page, e.g. `20` — not the size of the whole library, which is never counted (the list is meant to be scrolled, not totalled)
  """
  totalCount: Int!
}

"""
The result of cooking one version: which version you tried, how you rate it, and your notes, e.g. `v2` rated `4`. Recorded once — a version’s outcome cannot be edited afterwards.
"""
input RecordEssaiInput {
  """Your rating, `1` to `5`, e.g. `4`"""
  note: Note!

  """
  Base64 JPEG of the result, e.g. `"/9j/4AAQSkZJRg…"` (optional; not yet stored)
  """
  photo: String

  """Which recipe you cooked, e.g. the id of `"Grandma’s lasagna"`"""
  recipeId: RecipeId!

  """Your notes on how it turned out, e.g. `"Still a touch too sweet"`"""
  remarks: Remarks!

  """Which version of it you tried, e.g. `2`"""
  versionNumber: VersionNumber!
}

"""
What you get back after saving the result of an attempt, e.g. `v2` rated `4`
"""
type RecordEssaiResult {
  """
  `true` when this attempt — run on the pending version — scored `4` or more, so this version can now become the recipe’s new reference; the app then offers to "promote" it
  """
  promotionSuggested: Boolean!

  """
  The version you just rated, now updated with its note and remarks, e.g. `v2` with note `4`
  """
  version: Version!
}

"""
Free notes you jot down about an attempt, e.g. `"Still too sweet, cut the sugar next time"` (up to 2000 characters)
"""
scalar Remarks

"""Sort direction, e.g. `DESC`"""
enum SortOrder {
  """Ascending (oldest / lowest first), e.g. `v1` first"""
  ASC

  """Descending (newest / highest first), e.g. `v3` first"""
  DESC
}

"""
One instruction in the method, e.g. `"Fold in the egg whites"` (1 to 300 characters)
"""
scalar StepText

"""
The Thermomix machine settings that go with one step (only for TMX recipes). Every field is optional — a step can set just a speed, or a full time + temperature + speed combo, e.g. `"10 min / 100°C / speed 2"`.
"""
type TmxSettings {
  """
  Whether the blades spin in reverse (gentle mixing) — `true`/`false`, `null` if not set
  """
  reverse: Boolean

  """
  The blade speed, e.g. `"2"`, `"kneading"`, `"turbo"` (`null` if not set)
  """
  speed: TmxSpeed

  """
  The cooking temperature, e.g. `"100°C"` or `"Varoma"` (`null` if not set)
  """
  temperature: TmxTemperature

  """
  How long the step runs, e.g. `"10 min"` or `"30 s"` (`null` if not set)
  """
  time: TmxTime
}

"""
The Thermomix settings to attach to one step, e.g. `"10 min / 100°C / speed 2"`. Every field is optional.
"""
input TmxSettingsInput {
  """Reverse (gentle mixing) on or off, e.g. `true`"""
  reverse: Boolean

  """Blade speed, e.g. `"2"` or `"turbo"`"""
  speed: TmxSpeed

  """Temperature, e.g. `"100°C"`"""
  temperature: TmxTemperature

  """Duration, e.g. `"10 min"`"""
  time: TmxTime
}

"""
The blade speed of a Thermomix step, e.g. `"5"`, `"pétrin"` (kneading) or `"turbo"`
"""
scalar TmxSpeed

"""
The temperature of a Thermomix step, e.g. `"100°C"` or `"Varoma"` (its steam setting)
"""
scalar TmxTemperature

"""
How long a Thermomix step runs, written as you would read it, e.g. `"3 min"` or `"30 s"`
"""
scalar TmxTime

"""
Fields to rename a recipe, e.g. set title to `"Nonna’s lasagna"`. Send only what you want to change — anything you leave out stays as it was.
"""
input UpdateRecipeInput {
  """
  The new subtitle, e.g. `"with fresh basil"` (leave out to keep the current one)
  """
  subtitle: RecipeSubtitle

  """
  The new name, e.g. `"Nonna’s lasagna"` (leave out to keep the current one)
  """
  title: RecipeTitle
}

"""
Identifies one signed-in cook, e.g. `"user-7f3a"`. Every recipe belongs to exactly one of these.
"""
scalar UserId

"""
One version of a recipe — and, at the same time, one "essai" (a real attempt in the kitchen). Two sides to it: the CONTENT (its ingredients and steps, frozen the moment the version is created) and the OUTCOME (its rating and remarks, filled in once you have actually cooked it). Versions form a chain: `v1 → v2 → v3` … Each new version builds on the one before, so you can see what changed and whether it made the dish better.
"""
type Version {
  """
  A short summary of what this version changes versus the previous one, e.g. `"Baked at 180°C instead of 200°C"`. A dish or Thermomix recipe may change several things at once. `null` on the original `v1`, which changes nothing.
  """
  change: String

  """
  When this version was created (not when it was cooked — see executedAt), e.g. `"2026-07-18T14:30:00.000Z"`
  """
  createdAt: DateTime!

  """
  The day you actually cooked this version, e.g. `"2026-07-18T14:30:00.000Z"`. `null` means it is still an "essai à faire" (a to-do you have planned but not tried yet).
  """
  executedAt: DateTime

  """
  This version’s full ingredient list, in order, e.g. `"Flour — 250 g"` then `"Eggs — 3"` (empty list when it has none)
  """
  ingredients: [Ingredient!]!

  """
  Your rating of this attempt, from `1` (bad) to `5` (excellent). `null` until you have cooked it. A version needs `4` or more to become the recipe’s reference (see currentVersion).
  """
  note: Note

  """
  Its rank in the chain — `1` is the original import, `2` the first tweak, and so on
  """
  number: VersionNumber!

  """
  A short note about its origin, e.g. `"Marmiton"` (the site it was imported from), or `null` if none
  """
  originDetail: String

  """
  Where this version came from: the import, an AI suggestion, or written by hand
  """
  originKind: VersionOriginKind!

  """
  A link to the photo of the result, e.g. `"https://…/lasagna.jpg"` (always `null` for now — photos aren’t stored yet)
  """
  photoUrl: String

  """
  Which recipe this version belongs to, e.g. the id of `"Grandma’s lasagna"`
  """
  recipeId: RecipeId!

  """
  Your free notes on how it turned out, e.g. `"Still a touch too sweet, but the texture is spot on"`. `null` until you have cooked it.
  """
  remarks: Remarks

  """
  This version’s method, one short instruction per step, in order, e.g. `"Fold in the egg whites"`
  """
  steps: [StepText!]!

  """
  Per-step Thermomix settings aligned with steps, e.g. `"10 min / 100°C / speed 2"` (`null` = plain step; `[]` if not tmx)
  """
  tmxSteps: [TmxSettings]!

  """
  The quick yes/no of the field above: `true` once you have cooked and rated it, `false` while it is still waiting to be tried
  """
  tried: Boolean!

  """
  The reason behind that change, e.g. `"The top was burning at 200°C"`. `null` when not given.
  """
  why: String
}

"""
Which attempt in the chain — a whole number starting at `1` (`1` = the original, `2` = the first tweak…)
"""
scalar VersionNumber

"""
Where a version came from — how this entry in the lineage was born, e.g. `IMPORT`
"""
enum VersionOriginKind {
  """
  An iteration the AI drafted from the previous essai and the cook accepted, e.g. `"Less sugar, longer resting time"`
  """
  AI_PROPOSAL

  """
  The original `v1`, created when the recipe was imported, e.g. from `"Marmiton"`
  """
  IMPORT

  """
  A version the cook wrote by hand, without the AI, e.g. `"Swapped in honey"`
  """
  MANUAL
}