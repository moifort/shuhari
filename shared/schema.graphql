"""Result of accepting a proposal (an iteration or a variation)"""
type AcceptProposalResult {
  createdRecipeId: RecipeId
  createdVersion: VersionNumber
  recipe: Recipe!
}

"""A single version section of the application changelog"""
type ChangelogEntry {
  date: DateTime
  notes: [String!]!
  version: String!
}

"""Create a recipe (v1) from a confirmed import preview"""
input CreateRecipeInput {
  """The dish category detected at import"""
  category: DishCategory!

  """The recipe’s components with quantities"""
  ingredients: [IngredientInput!]

  """Where the recipe came from"""
  sourceLabel: String
  steps: [StepText!]!
  subtitle: RecipeSubtitle
  title: RecipeTitle!

  """Per-step Thermomix settings, aligned with steps (null = plain step)"""
  tmxSteps: [TmxSettingsInput]
  type: RecipeType!
}

"""ISO 8601 date-time string"""
scalar DateTime

"""
The course a dish belongs to — aggregate-level identity, drives library sorting
"""
enum DishCategory {
  BOULANGERIE
  DESSERT
  ENTREE
  PLAT
  SAUCE
  SOUPE
}

"""The read model behind the home screen"""
type Home {
  """Every recipe (the app groups them by type)"""
  library: [Recipe!]!

  """Latest trials across all recipes"""
  recentTrials: [Trial!]!

  """Recipes with a pending version awaiting a trial"""
  toTest: [Recipe!]!
}

"""Structured recipe extracted from an import source (editable preview)"""
type ImportAnalysis {
  """The dish category detected by the AI"""
  category: DishCategory!
  ingredients: [ImportIngredient!]!
  sourceLabel: String
  steps: [String!]!
  subtitle: String
  title: String!

  """Per-step Thermomix settings, aligned with steps (null = plain step)"""
  tmxSteps: [ImportTmxSettings]
  type: RecipeType!
}

"""A recipe ingredient extracted by the AI (unvalidated preview)"""
type ImportIngredient {
  name: String!
  quantity: String!
}

"""Number of records imported per collection"""
type ImportResult {
  recipes: Int!
  trials: Int!
  versions: Int!
}

"""
Thermomix settings for one step extracted by the AI (unvalidated preview)
"""
type ImportTmxSettings {
  reverse: Boolean
  speed: String
  temperature: String
  time: String
}

"""A recipe component with its measured quantity (ordered list)"""
type Ingredient {
  name: IngredientName!
  quantity: IngredientQuantity!
}

"""A recipe ingredient with its quantity (ordered)"""
input IngredientInput {
  name: IngredientName!
  quantity: IngredientQuantity!
}

"""Recipe ingredient name (1-120 chars)"""
scalar IngredientName

"""Recipe ingredient quantity with unit (1-60 chars)"""
scalar IngredientQuantity

type Mutation {
  """
  Accept a proposal as an iteration or a variation (optionally editing the draft first)
  """
  acceptProposal(
    choice: ProposalRecommendation!

    """The edited next-version draft, replacing the AI proposal when provided"""
    editedDraft: ProposalDraftInput
    recipeId: RecipeId!
    versionNumber: VersionNumber!
  ): AcceptProposalResult!

  """
  Analyze an import source (photos, a URL or raw text) into a structured recipe preview. Exactly one source must be provided. Results are cached server-side by SHA-256.
  """
  analyzeImport(
    """Base64 JPEGs (no data-URL prefix)"""
    photos: [String!]

    """Raw recipe text"""
    text: String

    """A recipe web page to read"""
    url: String
  ): ImportAnalysis!

  """Create a recipe and its v1 from a confirmed import preview"""
  createRecipe(input: CreateRecipeInput!): Recipe!

  """Delete a recipe and all its versions, trials and proposals"""
  deleteRecipe(id: RecipeId!): Boolean!

  """
  Replace all the current user records with the contents of a JSON envelope
  """
  importData(payload: String!): ImportResult!

  """
  Promote a pending version to the current reference (after a high-scoring trial)
  """
  promoteVersion(recipeId: RecipeId!, versionNumber: VersionNumber!): Recipe!

  """
  Record a trial (fast, no AI). Ask for a proposal separately if the note is low.
  """
  recordTrial(input: RecordTrialInput!): RecordTrialResult!

  """Refuse a proposal (removes it)"""
  refuseProposal(recipeId: RecipeId!, versionNumber: VersionNumber!): Boolean!

  """
  Ask the AI to analyze the latest trials and propose the next step (iterate or vary)
  """
  requestProposal(recipeId: RecipeId!): Proposal!

  """Rename a recipe (title and/or subtitle)"""
  updateRecipe(id: RecipeId!, input: UpdateRecipeInput!): Recipe!
}

"""Trial rating (integer 1..5)"""
scalar Note

"""An AI proposal for the next version of a recipe (presence == pending)"""
type Proposal {
  """A short human summary of what the next version changes"""
  changeSummary: String!
  createdAt: DateTime!

  """The full ingredient list of the drafted next version"""
  ingredients: [Ingredient!]!
  rationale: String!
  recipeId: RecipeId!
  recommendation: ProposalRecommendation!

  """The full step list of the drafted next version"""
  steps: [StepText!]!

  """
  Per-step Thermomix settings aligned with steps (null = plain step; [] if not tmx)
  """
  tmxSteps: [TmxSettings]!
  variation: VariationSuggestion
  versionNumber: VersionNumber!
}

"""
An edited next-version draft. When provided, it FULLY REPLACES the persisted AI draft — send the COMPLETE next version, not a partial edit (omitted ingredients/steps wipe those lists).
"""
input ProposalDraftInput {
  """The complete ingredient list of the next version (replaces the draft)"""
  ingredients: [IngredientInput!]!

  """The complete step list of the next version (replaces the draft)"""
  steps: [StepText!]!

  """Per-step Thermomix settings, aligned with steps (null = plain step)"""
  tmxSteps: [TmxSettingsInput]
}

"""
Whether the AI recommends iterating the recipe or spinning off a variation
"""
enum ProposalRecommendation {
  ITERATION
  VARIATION
}

type Query {
  """Application changelog, most recent versions first"""
  changelog: [ChangelogEntry!]!

  """JSON-encoded export of every record belonging to the current user"""
  exportData: String!

  """The home screen read model for the current user"""
  home: Home!

  """A single recipe by id"""
  recipe(id: RecipeId!): Recipe

  """The current user’s recipes, optionally filtered by type"""
  recipes(type: RecipeType): [Recipe!]!

  """A single trial by id"""
  trial(id: TrialId!): Trial
}

"""A recipe under experimentation, with its version lineage"""
type Recipe {
  """The highest trial note the recipe ever scored, or null if never tried"""
  bestNote: Note

  """The dish category — fixed at import, shared across all versions"""
  category: DishCategory!
  createdAt: DateTime!

  """The current reproducible reference version"""
  currentVersion: Version

  """The parent recipe when this is a variation"""
  derivedFrom: Recipe
  id: RecipeId!

  """The AI proposal awaiting a decision, if any"""
  pendingProposal: Proposal
  subtitle: String
  title: RecipeTitle!

  """The pending version awaiting a trial, if any"""
  toTest: Version

  """The recipe’s trial journal, most recent first"""
  trials: [Trial!]!
  type: RecipeType!
  updatedAt: DateTime!

  """Recipes derived from this one"""
  variations: [Recipe!]!

  """How many versions the recipe has (its highest version number)"""
  versionCount: VersionNumber!

  """The full lineage, oldest first"""
  versions: [Version!]!
}

"""Recipe unique identifier (UUID v4)"""
scalar RecipeId

"""Recipe subtitle (1-200 chars)"""
scalar RecipeSubtitle

"""Recipe title (1-200 chars)"""
scalar RecipeTitle

"""The kind of culinary experiment — a cooked dish or a Thermomix recipe"""
enum RecipeType {
  PLAT
  TMX
}

"""Record one execution of a recipe version"""
input RecordTrialInput {
  note: Note!

  """Base64 JPEG of the result (optional)"""
  photo: String
  recipeId: RecipeId!
  remarks: Remarks!
  versionNumber: VersionNumber!
}

"""Outcome of recording a trial"""
type RecordTrialResult {
  """True when this trial qualifies its version for promotion"""
  promotionSuggested: Boolean!
  trial: Trial!
}

"""Free-form trial remarks (up to 2000 chars)"""
scalar Remarks

"""A short recipe step (1-300 chars)"""
scalar StepText

"""Thermomix settings for one step (display-oriented, all optional)"""
type TmxSettings {
  reverse: Boolean
  speed: TmxSpeed
  temperature: TmxTemperature
  time: TmxTime
}

"""Thermomix settings for one step (all optional)"""
input TmxSettingsInput {
  reverse: Boolean
  speed: TmxSpeed
  temperature: TmxTemperature
  time: TmxTime
}

"""Thermomix step speed, display-oriented (e.g. "5", "pétrin", "turbo")"""
scalar TmxSpeed

"""Thermomix step temperature, display-oriented (e.g. "100°C", "Varoma")"""
scalar TmxTemperature

"""Thermomix step duration, display-oriented (e.g. "3 min", "30 s")"""
scalar TmxTime

"""One execution of a recipe version"""
type Trial {
  executedAt: DateTime!
  id: TrialId!
  note: Note!

  """
  Signed URL of the trial photo (null until photo storage is provisioned)
  """
  photoUrl: String
  recipeId: RecipeId!
  remarks: Remarks!
  versionNumber: VersionNumber!
}

"""Trial unique identifier (UUID v4)"""
scalar TrialId

"""Update a recipe’s title and subtitle. Absent fields are unchanged."""
input UpdateRecipeInput {
  subtitle: RecipeSubtitle
  title: RecipeTitle
}

"""Firebase Auth user identifier"""
scalar UserId

"""A suggested name and description when the AI recommends a variation"""
type VariationSuggestion {
  description: String!
  title: RecipeTitle!
}

"""An immutable entry in a recipe’s linear lineage (v1 → v2 → …)"""
type Version {
  """Mean trial note for this version, or null if never tried"""
  averageNote: Float
  change: String
  createdAt: DateTime!

  """The recipe’s components with quantities ([] when none)"""
  ingredients: [Ingredient!]!
  number: VersionNumber!
  originDetail: String
  originKind: VersionOriginKind!
  steps: [StepText!]!

  """
  Per-step Thermomix settings aligned with steps (null = plain step; [] if not tmx)
  """
  tmxSteps: [TmxSettings]!

  """How many trials ran against this version"""
  trialCount: Int!
  why: String
}

"""Version number in a recipe lineage (>= 1)"""
scalar VersionNumber

"""How a version came to exist"""
enum VersionOriginKind {
  AI_PROPOSAL
  IMPORT
  MANUAL
}