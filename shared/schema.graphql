"""
What you get back after accepting an AI suggestion, e.g. the new `v3` added to the chain
"""
type AcceptProposalResult {
  """The number of the version that was just created, e.g. `3`"""
  createdVersion: VersionNumber

  """
  The recipe, now with the accepted version added to its chain, e.g. `"Grandma’s lasagna"` now up to `v3`
  """
  recipe: Recipe!
}

"""
One release in the app’s "What’s new" list — the changes shipped in a given version of the app, e.g. `"1.2"` with "Faster recipe imports"
"""
type ChangelogEntry {
  """
  When that version was released, e.g. `"2026-07-18T00:00:00.000Z"` (`null` for a release not yet dated)
  """
  date: DateTime

  """
  The list of changes in this release, one line each, ready to show to the user, e.g. `"Faster recipe imports"` then `"Fixed a crash when exporting"`
  """
  notes: [String!]!

  """The app version these notes are for, e.g. `"1.2"`"""
  version: String!
}

"""
Everything needed to save a brand-new recipe (its `v1`), once you have reviewed the import preview and confirmed it, e.g. `"Grandma’s lasagna"` with its content
"""
input CreateRecipeInput {
  """Its course, e.g. `MAIN` for lasagna, as detected during import"""
  category: DishCategory!

  """
  The recipe body — provide exactly one of `dish` or `thermomix`, matching `type`
  """
  content: VersionContentInput!

  """Where it came from, e.g. `"Marmiton"` or `"Mum"`"""
  sourceLabel: String

  """The recipe’s name, e.g. `"Grandma’s lasagna"`"""
  title: RecipeTitle!

  """Cooked dish (`DISH`) or Thermomix recipe (`THERMOMIX`)"""
  type: RecipeType!
}

"""
A date and time, given in the standard ISO 8601 format, e.g. `"2026-07-18T14:30:00.000Z"` (the `"Z"` means UTC — the app shows it in your local time)
"""
scalar DateTime

"""
The course a dish belongs to. Detected once at import, shared by every version, and used to group and sort the library.
"""
enum DishCategory {
  """Bread and bakery, e.g. `"Sourdough loaf"`"""
  BAKING

  """Dessert, e.g. `"Tarte tatin"`"""
  DESSERT

  """Drink, e.g. `"Ginger lemonade"`"""
  DRINK

  """Main course, e.g. `"Grandma’s lasagna"`"""
  MAIN

  """Sauce or condiment, e.g. `"Béchamel"`"""
  SAUCE

  """Soup, e.g. `"Pumpkin velouté"`"""
  SOUP

  """Starter, e.g. `"Goat cheese salad"`"""
  STARTER
}

"""
The body of a cooked-dish version: its ingredient list and its plain-text method (no per-step machine settings).
"""
type DishContent {
  """
  The full ingredient list, in order, e.g. `"Flour — 250 g"` then `"Eggs — 3"` (empty list when it has none)
  """
  ingredients: [Ingredient!]!

  """
  The method, one short instruction per step, in order, e.g. `"Fold in the egg whites"`
  """
  steps: [StepText!]!
}

"""
The body of a cooked-dish version: its ingredient list and plain-text steps.
"""
input DishContentInput {
  """
  The ingredient list, in order, e.g. `"Flour — 250 g"` then `"Eggs — 3"` (send `[]` when the recipe has nothing measurable)
  """
  ingredients: [IngredientInput!]!

  """
  The method, one instruction per step, in order, e.g. `"Fold in the egg whites"`
  """
  steps: [StepText!]!
}

"""Structured recipe extracted from an import source (editable preview)"""
type ImportAnalysis {
  """The dish category detected by the AI"""
  category: DishCategory!
  ingredients: [ImportIngredient!]!
  sourceLabel: String

  """The extracted steps, each carrying its own Thermomix settings"""
  steps: [ImportStep!]!
  title: String!
  type: RecipeType!
}

"""A recipe ingredient extracted by the AI (unvalidated preview)"""
type ImportIngredient {
  name: String!
  quantity: String!
}

"""
A tally of what was restored after an import — how many rows of each kind were loaded, e.g. `12` recipes and `37` versions
"""
type ImportResult {
  """How many recipes were imported, e.g. `12`"""
  recipes: Int!

  """How many versions (across all those recipes) were imported, e.g. `37`"""
  versions: Int!
}

"""
A recipe step extracted by the AI (unvalidated preview): its text plus the Thermomix settings that go with it (every field `null` = a plain step).
"""
type ImportStep {
  """The step’s Thermomix settings (every field `null` = a plain step)"""
  settings: ImportThermomixSettings!
  text: String!
}

"""
Thermomix settings for one step extracted by the AI (unvalidated preview)
"""
type ImportThermomixSettings {
  reverse: Boolean
  speed: String
  temperature: String
  time: String
}

"""
One line of the ingredient list: what it is and how much of it. The list keeps its order, e.g. `"Flour — 250 g"`, then `"Butter — 100 g"`, then `"Eggs — 3"`.
"""
type Ingredient {
  """What the ingredient is, e.g. `"Flour"` or `"Fine salt"`"""
  name: IngredientName!

  """How much of it, unit included, e.g. `"250 g"`, `"2 tbsp"`, `"1 pinch"`"""
  quantity: IngredientQuantity!
}

"""
One ingredient line to save, e.g. name `"Flour"` + quantity `"250 g"`. Order is kept.
"""
input IngredientInput {
  """What it is, e.g. `"Flour"`"""
  name: IngredientName!

  """How much, unit included, e.g. `"250 g"`"""
  quantity: IngredientQuantity!
}

"""
The name of an ingredient, e.g. `"Flour"` or `"Fine salt"` (1 to 120 characters)
"""
scalar IngredientName

"""
How much of an ingredient, unit included, e.g. `"250 g"`, `"2 tbsp"`, `"1 pinch"` (1 to 60 characters)
"""
scalar IngredientQuantity

type Mutation {
  """
  Accept an AI suggestion (optionally after editing it). It becomes the next version in the chain, ready to cook. Coming from a cook (requestProposal), it carries that attempt — the rating, remarks and photo you just gave — and the version it iterates on is left exactly as it was. Coming from an improvement (requestImprovement), it carries no attempt and lands on your to-cook list instead.
  
  ```graphql
  acceptProposal(recipeId: "9f1c-a3b2", proposal: {
    basedOn: 2
    changeSummary: "Less sugar"
    rationale: "You noted it was too sweet"
    rating: 3
    remarks: "Still a touch too sweet"
    content: { dish: {
      ingredients: [{ name: "Sugar", quantity: "80 g" }]
      steps: ["Rest the dough for 2 h", "Bake at 180°C"]
    } }
  }) {
    createdVersion
  }
  ```
  """
  acceptProposal(
    """The full suggested version to save (with any edits you made)"""
    proposal: ProposalInput!

    """The recipe being iterated on, e.g. the id of `"Grandma’s lasagna"`"""
    recipeId: RecipeId!
  ): AcceptProposalResult!

  """
  Analyze an import source (photos, a URL or raw text) into a structured recipe preview. Exactly one source must be provided. Results are cached server-side by SHA-256.
  """
  analyzeImport(
    """
    Base64 JPEGs (no data-URL prefix) — `[]` when importing from a URL or text
    """
    photos: [String!]! = []

    """Raw recipe text"""
    text: String

    """A recipe web page to read"""
    url: String
  ): ImportAnalysis!

  """
  Save a new recipe. Turns a confirmed import preview into a real recipe with its first version (`v1`). Returns the freshly created recipe.
  
  ```graphql
  createRecipe(input: {
    type: DISH
    category: MAIN
    title: "Grandma's lasagna"
    content: { dish: {
      ingredients: [{ name: "Flour", quantity: "250 g" }]
      steps: ["Layer the pasta", "Bake at 200°C"]
    } }
  }) {
    id
    versionToOpen { number }
  }
  ```
  """
  createRecipe(
    """The recipe to create — name, category, and its content"""
    input: CreateRecipeInput!
  ): Recipe!

  """
  Delete a recipe for good, along with every version and attempt on it. Returns `true` on success.
  
  ```graphql
  deleteRecipe(id: "9f1c-a3b2")
  ```
  """
  deleteRecipe(
    """Which recipe to delete"""
    id: RecipeId!
  ): Boolean!

  """
  Restore a backup. WARNING: this REPLACES everything you currently have with the contents of the JSON text (as produced by exportData). Returns a count of what was loaded, e.g. `12` recipes.
  
  ```graphql
  importData(payload: "{\"recipes\":[…],\"versions\":[…]}") {
    recipes
    versions
  }
  ```
  """
  importData(
    """The backup as JSON text, exactly as exportData produced it"""
    payload: String!
  ): ImportResult!

  """
  Save what happened when you cooked a version: its rating, optionally a photo. Overwritable — recording again on the same version simply updates it. Fast and does not call the AI. Use this when the cook asks for nothing more. To iterate on what you noticed, ask for a proposal instead (see requestProposal): your remarks then land on the version they produce, and this one is left untouched. Returns the version, now updated with its outcome.
  
  ```graphql
  recordAttempt(input: {
    recipeId: "9f1c-a3b2"
    versionNumber: 2
    rating: 4
  }) {
    number
    rating
  }
  ```
  """
  recordAttempt(
    """The attempt to record — which version, the rating, optionally a photo"""
    input: RecordAttemptInput!
  ): Version!

  """
  Ask the AI for a next version answering something you want changed — no cook needed, just say what to improve. Nothing is saved yet: you get a proposal to review, and accepting it (see acceptProposal) creates the version, which lands on your to-cook list.
  
  ```graphql
  requestImprovement(
    recipeId: "9f1c-a3b2"
    versionNumber: 2
    improvement: "A vegetarian version, for 6"
  ) {
    changeSummary
    rationale
  }
  ```
  """
  requestImprovement(
    """
    What you want changed, in your own words, e.g. `"A vegetarian version, for 6"` — this is what the proposal answers
    """
    improvement: Remarks!

    """The recipe to improve, e.g. the id of `"Grandma’s lasagna"`"""
    recipeId: RecipeId!

    """The version to improve on, e.g. `2`"""
    versionNumber: VersionNumber!
  ): Proposal!

  """
  Ask the AI for a suggested next version. It looks at the version you just cooked and at how the cook went — the rating and remarks you send here — and proposes one improvement. Nothing is saved yet, not even your rating: it is recorded on the new version when you accept the proposal (see acceptProposal).
  
  ```graphql
  requestProposal(
    recipeId: "9f1c-a3b2"
    versionNumber: 2
    rating: 3
    remarks: "Still a touch too sweet"
  ) {
    basedOn
    changeSummary
    rationale
  }
  ```
  """
  requestProposal(
    """How that cook turned out, `1` to `5`, e.g. `3`"""
    rating: Rating!

    """
    The recipe to get a suggestion for, e.g. the id of `"Grandma’s lasagna"`
    """
    recipeId: RecipeId!

    """
    What you noticed and want fixed, e.g. `"Still a touch too sweet"` — this is what the proposal answers
    """
    remarks: Remarks!

    """The version you just cooked and want to iterate on, e.g. `2`"""
    versionNumber: VersionNumber!
  ): Proposal!

  """
  Retouch a recipe: rename it, mark it as a favourite, or both. Returns the updated recipe.
  
  ```graphql
  updateRecipe(id: "9f1c-a3b2", input: { title: "Nonna's lasagna", favorite: true }) {
    id
    title
    favorite
  }
  ```
  """
  updateRecipe(
    """Which recipe to update"""
    id: RecipeId!

    """What to change (leave a field out to change nothing)"""
    input: UpdateRecipeInput!
  ): Recipe!
}

"""
The AI’s suggestion for your next attempt, e.g. `"Less sugar, longer resting time"`. After an attempt, the AI reads your rating and remarks and proposes a tweaked version. It is just a proposal shown on screen — nothing is saved until you accept it (see acceptProposal).
"""
type Proposal {
  """
  The version this proposal iterates on (the one you just cooked), e.g. `2`. Sent straight back on accept so the new version records what it was based on.
  """
  basedOn: VersionNumber!

  """
  A one-line summary of what it changes, e.g. `"Less sugar, longer resting time"`
  """
  changeSummary: String!

  """
  The complete body of the suggested version (not just what changed) — a `DishContent` or a `ThermomixContent` depending on the recipe type
  """
  content: VersionContent!

  """
  The AI’s reasoning — why it thinks this change will help, based on your last remarks, e.g. `"You noted it was too sweet, so cutting the sugar should balance it"`
  """
  rationale: String!
}

"""
A complete next-version proposal to accept as an iteration, e.g. the AI’s `"Less sugar, longer resting time"` proposal. Send the FULL next version (an omitted ingredient/step wipes that list).
"""
input ProposalInput {
  """
  The version this iterates on — echo back the `basedOn` from the proposal, e.g. `2`
  """
  basedOn: VersionNumber!

  """
  A short human summary of what the next version changes, e.g. `"Less sugar"`
  """
  changeSummary: String!

  """
  The complete body of the next version — provide exactly one of `dish` or `thermomix`, matching the recipe type
  """
  content: VersionContentInput!

  """
  Base64 JPEG of that cook, e.g. `"/9j/4AAQSkZJRg…"` (optional; not yet stored)
  """
  photo: String

  """
  How the cook that asked for this version turned out, `1` to `5`, e.g. `3` (leave out when the proposal came from requestImprovement)
  """
  rating: Rating

  """The reasoning behind the change, e.g. `"You noted it was too sweet"`"""
  rationale: String!

  """
  What you noticed on that cook, e.g. `"Still a touch too sweet"` — the remarks this version answers (leave out when the proposal came from requestImprovement)
  """
  remarks: Remarks
}

type Query {
  """
  The app’s "What’s new" list — one entry per release, newest first. Feeds the changelog screen. For example the `"1.2"` entry with notes `"Faster recipe imports"` and `"Fixed a crash when exporting"`, then the `"1.1"` entry, and so on.
  
  ```graphql
  changelog {
    version
    date
    notes
  }
  ```
  """
  changelog: [ChangelogEntry!]!

  """
  Download all your data as one JSON text — a full backup of every recipe and version you own (e.g. your `"Grandma’s lasagna"` and all its attempts). Pair it with importData to move or restore your library.
  
  ```graphql
  query {
    exportData
  }
  ```
  """
  exportData: String!

  """
  Fetch one recipe by its id, with everything on it. Returns `null` if no such recipe exists.
  
  ```graphql
  recipe(id: "9f1c-a3b2") {
    title
    versionToOpen { number rating }
    versions { number change }
  }
  ```
  """
  recipe(
    """The id of the recipe to fetch, e.g. `"9f1c-a3b2"`"""
    id: RecipeId!
  ): Recipe

  """
  One page of your recipe library, loaded a few at a time for infinite scroll. You can narrow it (e.g. only `THERMOMIX` recipes, or only `DESSERT`) and choose the order. For example: the 20 most recently updated dishes, then pass the last id as `after` to load the next 20.
  
  ```graphql
  recipes(type: THERMOMIX, sort: UPDATED_AT, order: DESC, limit: 20) {
    items { id title bestRating }
    hasMore
  }
  ```
  """
  recipes(
    """Cursor: return the page following this recipe id, e.g. `"9f1c-a3b2"`"""
    after: RecipeId

    """
    Facet: keep only this dish category, e.g. `DESSERT`. When set, the page is coerced to updatedAt desc — the sort/order args are ignored (ranking within one category is meaningless, and it keeps the composite-index surface bounded)
    """
    category: DishCategory

    """
    Facet: keep only the recipes you marked as favourites, e.g. `true`. Mixes every type — pair it with the category sort to read them course by course
    """
    favorite: Boolean

    """Maximum recipes returned in the page, e.g. `20`"""
    limit: Int = 20

    """
    Sort direction, e.g. `DESC` (ignored for the category sort, which is fixed)
    """
    order: SortOrder = DESC

    """Field the page is ordered by, e.g. `UPDATED_AT`"""
    sort: RecipeSort = UPDATED_AT

    """Facet: keep only this recipe type, e.g. `THERMOMIX`"""
    type: RecipeType
  ): Recipes!
}

"""
A rating out of 5, as a whole number from `1` (bad) to `5` (excellent), e.g. `4`. The best rating across a recipe’s attempts drives the version its recipe sheet opens on.
"""
scalar Rating

"""
A dish you are perfecting over time. A recipe is the whole experiment, not a single recipe card: it holds a chain of versions (v1, v2, v3 …), each one an attempt in the kitchen. Its state is derived from that chain — its best rating (bestRating) and the version to open from the home (versionToOpen). Think `"Grandma’s lasagna"` and every attempt you have made to nail it.
"""
type Recipe {
  """
  The best rating this recipe ever got, across all the attempts you have cooked, e.g. `5` (`1`–`5`). `null` if you have never tried any version yet.
  """
  bestRating: Rating

  """
  Which course it is, e.g. `DESSERT` for a tarte tatin. Set once at import and shared by every version; used to group the library.
  """
  category: DishCategory!

  """When the recipe was first imported, e.g. `"2026-07-18T14:30:00.000Z"`"""
  createdAt: DateTime!

  """
  Whether you marked it as a favourite, e.g. `true` for the risotto you keep coming back to. Drives the library’s favourites lens (see the `favorite` argument on `recipes`).
  """
  favorite: Boolean!

  """Its unique identifier, e.g. `"9f1c…-a3b2"`"""
  id: RecipeId!

  """Its name, e.g. `"Grandma’s lasagna"`"""
  title: RecipeTitle!

  """
  Whether it is a cooked dish (`DISH`) or a Thermomix recipe (`THERMOMIX`)
  """
  type: RecipeType!

  """
  When anything last changed on it (a new version, a rating…), e.g. `"2026-07-18T14:30:00.000Z"`. Drives library sort.
  """
  updatedAt: DateTime!

  """
  How many versions exist so far — also the number of the most recent one, e.g. `3` after `v1 → v2 → v3`
  """
  versionCount: VersionNumber!

  """
  The version to show first when you open this recipe: the attempt in progress (the most recent one built on your best-rated version), or that best-rated version itself, or — if you have never cooked any — the latest version. Never `null`; a recipe always has at least its `v1`.
  """
  versionToOpen: Version!

  """The whole history, oldest first, e.g. `v1 → v2 → v3`"""
  versions: [Version!]!
}

"""
The unique id of a recipe — a long random string like `"9f1c…-a3b2"` you pass around to fetch or change that one recipe (e.g. your `"Grandma’s lasagna"`)
"""
scalar RecipeId

"""Field the paginated recipe library is ordered by, e.g. `UPDATED_AT`"""
enum RecipeSort {
  """
  Dish course order (`STARTER → MAIN → DESSERT → SOUP → SAUCE → BAKING → DRINK`), most recently modified first within a course
  """
  CATEGORY

  """
  Most recently modified first (honours order), e.g. today’s lasagna edit on top
  """
  UPDATED_AT
}

"""A recipe’s name, e.g. `"Grandma’s lasagna"` (1 to 200 characters)"""
scalar RecipeTitle

"""
The kind of culinary experiment. Fixed at import, it decides how a version is displayed and how the AI is allowed to iterate on it.
"""
enum RecipeType {
  """A cooked dish — steps are plain text, e.g. `"Grandma’s lasagna"`"""
  DISH

  """
  A Thermomix recipe — each step also carries machine settings, e.g. `"10 min / 100°C / speed 2"`
  """
  THERMOMIX
}

"""
One slice of your recipe library — a single "page" of results, the way an app loads a few at a time as you scroll rather than everything at once.
"""
type Recipes {
  """
  Are there more recipes to load after this page? (`true` = keep scrolling, `false` = you have reached the end)
  """
  hasMore: Boolean!

  """
  The recipes on this page, e.g. `"Grandma’s lasagna"` then `"Tarte tatin"`
  """
  items: [Recipe!]!

  """
  How many recipes are on THIS page, e.g. `20` — not the size of the whole library, which is never counted (the list is meant to be scrolled, not totalled)
  """
  totalCount: Int!
}

"""
The result of cooking one version: which version you tried, how you rate it, and your remarks, e.g. `v2` rated `4`. Recorded once — a version’s outcome cannot be edited afterwards.
"""
input RecordAttemptInput {
  """
  Base64 JPEG of the result, e.g. `"/9j/4AAQSkZJRg…"` (optional; not yet stored)
  """
  photo: String

  """Your rating, `1` to `5`, e.g. `4`"""
  rating: Rating!

  """Which recipe you cooked, e.g. the id of `"Grandma’s lasagna"`"""
  recipeId: RecipeId!

  """
  Your remarks on how it turned out, e.g. `"Still a touch too sweet"` (optional)
  """
  remarks: Remarks

  """Which version of it you tried, e.g. `2`"""
  versionNumber: VersionNumber!
}

"""
Free notes you jot down about an attempt, e.g. `"Still too sweet, cut the sugar next time"` (up to 2000 characters)
"""
scalar Remarks

"""Sort direction, e.g. `DESC`"""
enum SortOrder {
  """Ascending (oldest / lowest first), e.g. `v1` first"""
  ASC

  """Descending (newest / highest first), e.g. `v3` first"""
  DESC
}

"""
One instruction in the method, e.g. `"Fold in the egg whites"` (1 to 300 characters)
"""
scalar StepText

"""
The body of a Thermomix version: its ingredient list and its steps, each carrying its own Thermomix settings.
"""
type ThermomixContent {
  """The full ingredient list, in order (empty list when it has none)"""
  ingredients: [Ingredient!]!

  """The method, each step carrying its own Thermomix settings"""
  steps: [ThermomixStep!]!
}

"""
The body of a Thermomix version: its ingredient list and its steps, each carrying its own Thermomix settings.
"""
input ThermomixContentInput {
  """The ingredient list, in order (send `[]` when the recipe has none)"""
  ingredients: [IngredientInput!]!

  """The method, each step carrying its own Thermomix settings"""
  steps: [ThermomixStepInput!]!
}

"""
The Thermomix machine settings that go with one step (only for Thermomix recipes). Every field is optional — a step can set just a speed, or a full time + temperature + speed combo, e.g. `"10 min / 100°C / speed 2"`.
"""
type ThermomixSettings {
  """
  Whether the blades spin in reverse (gentle mixing) — `true`/`false`, `null` if not set
  """
  reverse: Boolean

  """
  The blade speed, e.g. `"2"`, `"kneading"`, `"turbo"` (`null` if not set)
  """
  speed: ThermomixSpeed

  """
  The cooking temperature, e.g. `"100°C"` or `"Varoma"` (`null` if not set)
  """
  temperature: ThermomixTemperature

  """
  How long the step runs, e.g. `"10 min"` or `"30 s"` (`null` if not set)
  """
  time: ThermomixTime
}

"""
The Thermomix settings to attach to one step, e.g. `"10 min / 100°C / speed 2"`. Every field is optional.
"""
input ThermomixSettingsInput {
  """Reverse (gentle mixing) on or off, e.g. `true`"""
  reverse: Boolean

  """Blade speed, e.g. `"2"` or `"turbo"`"""
  speed: ThermomixSpeed

  """Temperature, e.g. `"100°C"`"""
  temperature: ThermomixTemperature

  """Duration, e.g. `"10 min"`"""
  time: ThermomixTime
}

"""
The blade speed of a Thermomix step, e.g. `"5"`, `"pétrin"` (kneading) or `"turbo"`
"""
scalar ThermomixSpeed

"""
One Thermomix step: its instruction plus the machine settings that go with it. A plain step (no machine settings) carries an empty settings object.
"""
type ThermomixStep {
  """
  The Thermomix settings for this step, e.g. `"10 min / 100°C / speed 2"` (every field left out = a plain step)
  """
  settings: ThermomixSettings!

  """The step instruction, e.g. `"Mix the onions"`"""
  text: StepText!
}

"""
One Thermomix step to save: its instruction plus the machine settings that go with it. Send `settings: {}` for a plain step (no machine settings).
"""
input ThermomixStepInput {
  """
  Its Thermomix settings, e.g. `"10 min / 100°C / speed 2"` (send `{}` for a plain step)
  """
  settings: ThermomixSettingsInput!

  """The step instruction, e.g. `"Mix the onions"`"""
  text: StepText!
}

"""
The temperature of a Thermomix step, e.g. `"100°C"` or `"Varoma"` (its steam setting)
"""
scalar ThermomixTemperature

"""
How long a Thermomix step runs, written as you would read it, e.g. `"3 min"` or `"30 s"`
"""
scalar ThermomixTime

"""
What you can retouch on a recipe: its name and whether it is a favourite. Send only what you want to change — anything you leave out stays as it was.
"""
input UpdateRecipeInput {
  """
  `true` marks it as a favourite, `false` un-marks it, e.g. `true` for the risotto you keep coming back to (leave out to keep it as it is)
  """
  favorite: Boolean

  """
  The new name, e.g. `"Nonna’s lasagna"` (leave out to keep the current one)
  """
  title: RecipeTitle
}

"""
Identifies one signed-in cook, e.g. `"user-7f3a"`. Every recipe belongs to exactly one of these.
"""
scalar UserId

"""
One version of a recipe — and, at the same time, one attempt (a real cook in the kitchen). Two sides to it: the CONTENT (its ingredients and steps, frozen the moment the version is created) and the OUTCOME (its rating and remarks, filled in once you have actually cooked it). Versions form a chain: `v1 → v2 → v3` … Each new version builds on the one before, so you can see what changed and whether it made the dish better.
"""
type Version {
  """
  The version this one iterates on — the attempt it was built from, e.g. `2` for a `v3` proposed after cooking `v2`. `null` on the original `v1`, which builds on nothing.
  """
  basedOn: VersionNumber

  """
  A short summary of what this version changes versus the previous one, e.g. `"Baked at 180°C instead of 200°C"`. A dish or Thermomix recipe may change several things at once. `null` on the original `v1`, which changes nothing.
  """
  change: String

  """
  This version’s body — its ingredients and steps. A `DishContent` for a cooked dish (plain-text steps), a `ThermomixContent` for a Thermomix recipe (each step carrying its machine settings).
  """
  content: VersionContent!

  """
  When this version was created (not when it was cooked — see executedAt), e.g. `"2026-07-18T14:30:00.000Z"`
  """
  createdAt: DateTime!

  """
  The day you actually cooked this version, e.g. `"2026-07-18T14:30:00.000Z"`. `null` means it is still a planned attempt (a to-do you have lined up but not tried yet).
  """
  executedAt: DateTime

  """
  Its rank in the chain — `1` is the original import, `2` the first tweak, and so on
  """
  number: VersionNumber!

  """
  A short label about its origin, e.g. `"Marmiton"` (the site it was imported from), or `null` if none
  """
  originDetail: String

  """
  Where this version came from: the import, an AI suggestion, or written by hand
  """
  originKind: VersionOriginKind!

  """
  A link to the photo of the result, e.g. `"https://…/lasagna.jpg"` (always `null` for now — photos aren’t stored yet)
  """
  photoUrl: String

  """
  Your rating of this attempt, from `1` (bad) to `5` (excellent). `null` until you have cooked it. The recipe’s best rating across its versions drives what it displays (see bestRating).
  """
  rating: Rating

  """
  Which recipe this version belongs to, e.g. the id of `"Grandma’s lasagna"`
  """
  recipeId: RecipeId!

  """
  Your free notes on how it turned out, e.g. `"Still a touch too sweet, but the texture is spot on"`. `null` until you have cooked it.
  """
  remarks: Remarks

  """
  Whether this version is on your to-cook list, e.g. `true` for the version you just got out of requestImprovement. Only an improvement puts a version there; cooking it (a rating, a photo, remarks) takes it off.
  """
  toTest: Boolean!

  """
  The quick yes/no of the field above: `true` once you have cooked and rated it, `false` while it is still waiting to be tried
  """
  tried: Boolean!

  """
  The reason behind that change, e.g. `"The top was burning at 200°C"`. `null` when not given.
  """
  why: String
}

"""
The body of a version, which depends on the recipe type: a `DishContent` for a cooked dish, a `ThermomixContent` for a Thermomix recipe.
"""
union VersionContent = DishContent | ThermomixContent

"""
The body of a version, tagged by recipe type: provide EXACTLY ONE of `dish` (a cooked dish) or `thermomix` (a Thermomix recipe).
"""
input VersionContentInput @oneOf {
  """A cooked-dish body"""
  dish: DishContentInput

  """A Thermomix body"""
  thermomix: ThermomixContentInput
}

"""
Which attempt in the chain — a whole number starting at `1` (`1` = the original, `2` = the first tweak…)
"""
scalar VersionNumber

"""
Where a version came from — how this entry in the lineage was born, e.g. `IMPORT`
"""
enum VersionOriginKind {
  """
  An iteration the AI proposed from the previous attempt and the cook accepted, e.g. `"Less sugar, longer resting time"`
  """
  AI_PROPOSAL

  """
  The original `v1`, created when the recipe was imported, e.g. from `"Marmiton"`
  """
  IMPORT

  """
  A version the cook wrote by hand, without the AI, e.g. `"Swapped in honey"`
  """
  MANUAL
}