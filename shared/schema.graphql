"""Result of accepting a draft as an iteration"""
type AcceptDraftResult {
  createdVersion: VersionNumber
  recipe: Recipe!
}

"""A single version section of the application changelog"""
type ChangelogEntry {
  date: DateTime
  notes: [String!]!
  version: String!
}

"""Create a recipe (v1) from a confirmed import preview"""
input CreateRecipeInput {
  """The dish category detected at import"""
  category: DishCategory!

  """The recipe’s components with quantities"""
  ingredients: [IngredientInput!]

  """Where the recipe came from"""
  sourceLabel: String
  steps: [StepText!]!
  subtitle: RecipeSubtitle
  title: RecipeTitle!

  """Per-step Thermomix settings, aligned with steps (null = plain step)"""
  tmxSteps: [TmxSettingsInput]
  type: RecipeType!
}

"""ISO 8601 date-time string"""
scalar DateTime

"""
The course a dish belongs to — aggregate-level identity, drives library sorting
"""
enum DishCategory {
  BOULANGERIE
  DESSERT
  ENTREE
  PLAT
  SAUCE
  SOUPE
}

"""
An ephemeral AI draft of the next version of a recipe (never persisted)
"""
type Draft {
  """A short human summary of what the next version changes"""
  changeSummary: String!

  """The full ingredient list of the drafted next version"""
  ingredients: [Ingredient!]!
  rationale: String!

  """The full step list of the drafted next version"""
  steps: [StepText!]!

  """
  Per-step Thermomix settings aligned with steps (null = plain step; [] if not tmx)
  """
  tmxSteps: [TmxSettings]!
  versionNumber: VersionNumber!
}

"""
A complete next-version draft to accept as an iteration. Send the FULL next version (omitted ingredients/steps wipe those lists).
"""
input DraftInput {
  """A short human summary of what the next version changes"""
  changeSummary: String!

  """The complete ingredient list of the next version"""
  ingredients: [IngredientInput!]!

  """The reasoning behind the change"""
  rationale: String!

  """The complete step list of the next version"""
  steps: [StepText!]!

  """Per-step Thermomix settings, aligned with steps (null = plain step)"""
  tmxSteps: [TmxSettingsInput]
}

"""The read model behind the home screen"""
type Home {
  """Every recipe (the app groups them by type)"""
  library: [Recipe!]!

  """Latest executed versions across all recipes, newest first"""
  recentEssais: [Version!]!

  """Recipes with a pending version awaiting an essai"""
  toTest: [Recipe!]!
}

"""Structured recipe extracted from an import source (editable preview)"""
type ImportAnalysis {
  """The dish category detected by the AI"""
  category: DishCategory!
  ingredients: [ImportIngredient!]!
  sourceLabel: String
  steps: [String!]!
  subtitle: String
  title: String!

  """Per-step Thermomix settings, aligned with steps (null = plain step)"""
  tmxSteps: [ImportTmxSettings]
  type: RecipeType!
}

"""A recipe ingredient extracted by the AI (unvalidated preview)"""
type ImportIngredient {
  name: String!
  quantity: String!
}

"""Number of records imported per collection"""
type ImportResult {
  recipes: Int!
  versions: Int!
}

"""
Thermomix settings for one step extracted by the AI (unvalidated preview)
"""
type ImportTmxSettings {
  reverse: Boolean
  speed: String
  temperature: String
  time: String
}

"""A recipe component with its measured quantity (ordered list)"""
type Ingredient {
  name: IngredientName!
  quantity: IngredientQuantity!
}

"""A recipe ingredient with its quantity (ordered)"""
input IngredientInput {
  name: IngredientName!
  quantity: IngredientQuantity!
}

"""Recipe ingredient name (1-120 chars)"""
scalar IngredientName

"""Recipe ingredient quantity with unit (1-60 chars)"""
scalar IngredientQuantity

type Mutation {
  """
  Accept a draft as an iteration, appending it as the next version to test
  """
  acceptDraft(draft: DraftInput!, recipeId: RecipeId!): AcceptDraftResult!

  """
  Analyze an import source (photos, a URL or raw text) into a structured recipe preview. Exactly one source must be provided. Results are cached server-side by SHA-256.
  """
  analyzeImport(
    """Base64 JPEGs (no data-URL prefix)"""
    photos: [String!]

    """Raw recipe text"""
    text: String

    """A recipe web page to read"""
    url: String
  ): ImportAnalysis!

  """Create a recipe and its v1 from a confirmed import preview"""
  createRecipe(input: CreateRecipeInput!): Recipe!

  """Delete a recipe and all its versions"""
  deleteRecipe(id: RecipeId!): Boolean!

  """Discard the pending essai — delete its untried version"""
  discardPendingVersion(recipeId: RecipeId!, versionNumber: VersionNumber!): Boolean!

  """
  Replace all the current user records with the contents of a JSON envelope
  """
  importData(payload: String!): ImportResult!

  """
  Promote a pending version to the current reference (after a high-scoring trial)
  """
  promoteVersion(recipeId: RecipeId!, versionNumber: VersionNumber!): Recipe!

  """
  Record an essai onto a version (fast, no AI). Ask for a draft separately if the note is low.
  """
  recordEssai(input: RecordEssaiInput!): RecordEssaiResult!

  """Ask the AI to analyze the latest essai and draft the next iteration"""
  requestDraft(recipeId: RecipeId!): Draft!

  """Rename a recipe (title and/or subtitle)"""
  updateRecipe(id: RecipeId!, input: UpdateRecipeInput!): Recipe!
}

"""Essai rating (integer 1..5)"""
scalar Note

type Query {
  """Application changelog, most recent versions first"""
  changelog: [ChangelogEntry!]!

  """JSON-encoded export of every record belonging to the current user"""
  exportData: String!

  """The home screen read model for the current user"""
  home: Home!

  """A single recipe by id"""
  recipe(id: RecipeId!): Recipe

  """
  A page of the current user’s recipe library, filtered by type and sorted per view
  """
  recipes(
    """Cursor: return the page following this recipe id"""
    after: RecipeId

    """
    Facet: keep only this dish category. When set, the page is coerced to updatedAt desc — the sort/order args are ignored (ranking within one category is meaningless, and it keeps the composite-index surface bounded)
    """
    category: DishCategory

    """Maximum recipes returned in the page"""
    limit: Int = 20

    """Sort direction (ignored for the category sort, which is fixed)"""
    order: SortOrder = DESC

    """Field the page is ordered by"""
    sort: RecipeSort = UPDATED_AT

    """Facet: keep only this recipe type"""
    type: RecipeType
  ): Recipes!
}

"""A recipe under experimentation, with its version lineage"""
type Recipe {
  """The highest essai note the recipe ever scored, or null if never tried"""
  bestNote: Note

  """The dish category — fixed at import, shared across all versions"""
  category: DishCategory!
  createdAt: DateTime!

  """
  The current reproducible reference version, or null until the first promotion
  """
  currentVersion: Version
  id: RecipeId!

  """
  Versions still awaiting their first run, most recent first — empty for a recipe that only holds its original version
  """
  pendingEssais: [Version!]!
  subtitle: String
  title: RecipeTitle!

  """The pending version awaiting an essai, if any"""
  toTest: Version
  type: RecipeType!
  updatedAt: DateTime!

  """How many versions the recipe has (its highest version number)"""
  versionCount: VersionNumber!

  """The full lineage, oldest first"""
  versions: [Version!]!
}

"""Recipe unique identifier (UUID v4)"""
scalar RecipeId

"""Field the paginated recipe library is ordered by"""
enum RecipeSort {
  """
  Dish course order (Entrée → Plat → Dessert → Soupe → Sauce → Boulangerie), most recently modified first within a course
  """
  CATEGORY

  """Most recently modified first (honours order)"""
  UPDATED_AT
}

"""Recipe subtitle (1-200 chars)"""
scalar RecipeSubtitle

"""Recipe title (1-200 chars)"""
scalar RecipeTitle

"""The kind of culinary experiment — a cooked dish or a Thermomix recipe"""
enum RecipeType {
  PLAT
  TMX
}

"""A page of the recipe library"""
type Recipes {
  """Whether more recipes are available after this page"""
  hasMore: Boolean!
  items: [Recipe!]!

  """
  Number of recipes in this page (the full library count is not computed)
  """
  totalCount: Int!
}

"""Record the essai outcome of a recipe version (written once)"""
input RecordEssaiInput {
  note: Note!

  """Base64 JPEG of the result (optional; not yet stored)"""
  photo: String
  recipeId: RecipeId!
  remarks: Remarks!
  versionNumber: VersionNumber!
}

"""Outcome of recording an essai onto a version"""
type RecordEssaiResult {
  """True when this essai qualifies its version for promotion"""
  promotionSuggested: Boolean!
  version: Version!
}

"""Free-form essai remarks (up to 2000 chars)"""
scalar Remarks

"""Sort direction"""
enum SortOrder {
  """Ascending (oldest / lowest first)"""
  ASC

  """Descending (newest / highest first)"""
  DESC
}

"""A short recipe step (1-300 chars)"""
scalar StepText

"""Thermomix settings for one step (display-oriented, all optional)"""
type TmxSettings {
  reverse: Boolean
  speed: TmxSpeed
  temperature: TmxTemperature
  time: TmxTime
}

"""Thermomix settings for one step (all optional)"""
input TmxSettingsInput {
  reverse: Boolean
  speed: TmxSpeed
  temperature: TmxTemperature
  time: TmxTime
}

"""Thermomix step speed, display-oriented (e.g. "5", "pétrin", "turbo")"""
scalar TmxSpeed

"""Thermomix step temperature, display-oriented (e.g. "100°C", "Varoma")"""
scalar TmxTemperature

"""Thermomix step duration, display-oriented (e.g. "3 min", "30 s")"""
scalar TmxTime

"""Update a recipe’s title and subtitle. Absent fields are unchanged."""
input UpdateRecipeInput {
  subtitle: RecipeSubtitle
  title: RecipeTitle
}

"""Firebase Auth user identifier"""
scalar UserId

"""
A recipe version — an entry in the lineage (v1 → v2 → …) that is also an essai
"""
type Version {
  change: String
  createdAt: DateTime!

  """
  When the essai was executed, or null while still an "essai à faire"
  """
  executedAt: DateTime

  """The recipe’s components with quantities ([] when none)"""
  ingredients: [Ingredient!]!

  """The essai rating, or null while not yet executed"""
  note: Note
  number: VersionNumber!
  originDetail: String
  originKind: VersionOriginKind!

  """
  Signed URL of the essai photo (null until photo storage is provisioned)
  """
  photoUrl: String
  recipeId: RecipeId!

  """The essai remarks, or null while not yet executed"""
  remarks: Remarks
  steps: [StepText!]!

  """
  Per-step Thermomix settings aligned with steps (null = plain step; [] if not tmx)
  """
  tmxSteps: [TmxSettings]!

  """Whether this version has been executed (its essai recorded)"""
  tried: Boolean!
  why: String
}

"""Version number in a recipe lineage (>= 1)"""
scalar VersionNumber

"""How a version came to exist"""
enum VersionOriginKind {
  AI_PROPOSAL
  IMPORT
  MANUAL
}