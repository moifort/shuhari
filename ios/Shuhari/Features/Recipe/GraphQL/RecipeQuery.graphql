fragment VersionContentFields on VersionContent {
  __typename
  ... on DishContent {
    ingredients {
      name
      quantity
    }
    dishSteps: steps
  }
  ... on ThermomixContent {
    ingredients {
      name
      quantity
    }
    thermomixSteps: steps {
      text
      settings {
        time
        temperature
        speed
        reverse
      }
    }
  }
}

fragment VersionFields on Version {
  number
  basedOn
  change
  why
  originKind
  originDetail
  content {
    ...VersionContentFields
  }
  tips
  recipeId
  rating
  remarks
  executedAt
  tried
  toTest
  photoUrl
  createdAt
}

query Recipe($id: RecipeId!) {
  recipe(id: $id) {
    id
    title
    type
    category
    favorite
    createdAt
    updatedAt
    bestRating
    versionToOpen {
      ...VersionFields
    }
    versions {
      ...VersionFields
    }
  }
}
