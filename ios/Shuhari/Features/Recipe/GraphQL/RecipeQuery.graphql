fragment VersionFields on Version {
  number
  change
  why
  originKind
  originDetail
  ingredients {
    name
    quantity
  }
  steps
  tmxSteps {
    time
    temperature
    speed
    reverse
  }
  recipeId
  note
  remarks
  executedAt
  tried
  photoUrl
  createdAt
}

query Recipe($id: RecipeId!) {
  recipe(id: $id) {
    id
    title
    subtitle
    type
    category
    createdAt
    updatedAt
    currentVersion {
      ...VersionFields
    }
    toTest {
      ...VersionFields
    }
    versions {
      ...VersionFields
    }
    pendingEssais {
      ...VersionFields
    }
  }
}
