mutation RecordEssai($input: RecordEssaiInput!) {
  recordEssai(input: $input) {
    promotionSuggested
    version {
      ...VersionFields
    }
  }
}

mutation RequestDraft($recipeId: RecipeId!) {
  requestDraft(recipeId: $recipeId) {
    ...DraftFields
  }
}

fragment DraftFields on Draft {
  versionNumber
  changeSummary
  rationale
  ingredients {
    name
    quantity
  }
  steps
  tmxSteps {
    time
    temperature
    speed
    reverse
  }
}
