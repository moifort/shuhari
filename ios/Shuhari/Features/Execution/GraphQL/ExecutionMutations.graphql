mutation RecordTrial($input: RecordTrialInput!) {
  recordTrial(input: $input) {
    promotionSuggested
    trial {
      ...TrialFields
    }
  }
}

mutation RequestDraft($recipeId: RecipeId!) {
  requestDraft(recipeId: $recipeId) {
    ...DraftFields
  }
}

fragment DraftFields on Draft {
  versionNumber
  changeSummary
  rationale
  ingredients {
    name
    quantity
  }
  steps
  tmxSteps {
    time
    temperature
    speed
    reverse
  }
}
