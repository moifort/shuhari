mutation RecordAttempt($input: RecordAttemptInput!) {
  recordAttempt(input: $input) {
    ...VersionFields
  }
}

mutation RequestProposal($recipeId: RecipeId!, $versionNumber: VersionNumber!) {
  requestProposal(recipeId: $recipeId, versionNumber: $versionNumber) {
    ...ProposalFields
  }
}

fragment ProposalFields on Proposal {
  basedOn
  changeSummary
  rationale
  content {
    ...VersionContentFields
  }
}
