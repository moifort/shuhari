mutation RecordAttempt($input: RecordAttemptInput!) {
  recordAttempt(input: $input) {
    ...VersionFields
  }
}

mutation RequestProposal(
  $recipeId: RecipeId!
  $versionNumber: VersionNumber!
  $rating: Rating!
  $remarks: Remarks!
) {
  requestProposal(
    recipeId: $recipeId
    versionNumber: $versionNumber
    rating: $rating
    remarks: $remarks
  ) {
    ...ProposalFields
  }
}

fragment ProposalFields on Proposal {
  basedOn
  changeSummary
  rationale
  content {
    ...VersionContentFields
  }
  tips
}
