mutation RecordEssai($input: RecordEssaiInput!) {
  recordEssai(input: $input) {
    ...VersionFields
  }
}

mutation RequestProposition($recipeId: RecipeId!, $versionNumber: VersionNumber!) {
  requestProposition(recipeId: $recipeId, versionNumber: $versionNumber) {
    ...PropositionFields
  }
}

fragment PropositionFields on Proposition {
  basedOn
  changeSummary
  rationale
  ingredients {
    name
    quantity
  }
  steps
  tmxSteps {
    time
    temperature
    speed
    reverse
  }
}
