mutation AnalyzeImport($photos: [String!]!, $url: String, $text: String) {
  analyzeImport(photos: $photos, url: $url, text: $text) {
    title
    type
    category
    sourceLabel
    ingredients {
      name
      quantity
    }
    steps
    tmxSteps {
      time
      temperature
      speed
      reverse
    }
  }
}

mutation CreateRecipe($input: CreateRecipeInput!) {
  createRecipe(input: $input) {
    id
  }
}
