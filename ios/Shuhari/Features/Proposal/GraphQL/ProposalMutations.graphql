mutation AcceptProposal($recipeId: RecipeId!, $proposal: ProposalInput!) {
  acceptProposal(recipeId: $recipeId, proposal: $proposal) {
    recipe {
      id
    }
    createdVersion
  }
}

mutation RequestImprovement(
  $recipeId: RecipeId!
  $versionNumber: VersionNumber!
  $improvement: Remarks!
) {
  requestImprovement(
    recipeId: $recipeId
    versionNumber: $versionNumber
    improvement: $improvement
  ) {
    ...ProposalFields
  }
}

mutation RequestTips($recipeId: RecipeId!, $versionNumber: VersionNumber!, $tips: Remarks!) {
  requestTips(recipeId: $recipeId, versionNumber: $versionNumber, tips: $tips) {
    tips
  }
}

mutation UpdateTips($recipeId: RecipeId!, $versionNumber: VersionNumber!, $tips: [Tip!]!) {
  updateTips(recipeId: $recipeId, versionNumber: $versionNumber, tips: $tips) {
    number
    tips
  }
}
