mutation AcceptProposal(
  $recipeId: RecipeId!
  $versionNumber: VersionNumber!
  $choice: ProposalRecommendation!
  $editedDraft: ProposalDraftInput
) {
  acceptProposal(
    recipeId: $recipeId
    versionNumber: $versionNumber
    choice: $choice
    editedDraft: $editedDraft
  ) {
    recipe {
      id
    }
    createdRecipeId
    createdVersion
  }
}

mutation RefuseProposal($recipeId: RecipeId!, $versionNumber: VersionNumber!) {
  refuseProposal(recipeId: $recipeId, versionNumber: $versionNumber)
}
