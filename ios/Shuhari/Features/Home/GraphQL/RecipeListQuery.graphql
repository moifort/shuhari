query RecipeList(
  $type: RecipeType
  $category: DishCategory
  $favorite: Boolean
  $sort: RecipeSort
  $order: SortOrder
  $limit: Int
  $after: RecipeId
) {
  recipes(
    type: $type
    category: $category
    favorite: $favorite
    sort: $sort
    order: $order
    limit: $limit
    after: $after
  ) {
    items {
      id
      title
      type
      category
      favorite
      updatedAt
      versionCount
      attemptCount
      bestRating
    }
    hasMore
    totalCount
  }
}
