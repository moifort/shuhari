query Home {
  home {
    toTest {
      id
      title
      subtitle
      type
      category
      toTest {
        number
        change
        why
        originDetail
      }
    }
    library {
      id
      title
      subtitle
      type
      category
      updatedAt
      versionCount
      bestNote
      currentVersion {
        averageNote
      }
    }
    recentTrials {
      id
      recipeId
      versionNumber
      note
      remarks
      executedAt
    }
  }
}
